<svg xmlns="http://www.w3.org/2000/svg" width="155" height="46" viewBox="0 0 155 46">
  <rect width="155" height="46" rx="8" fill="#1a1a2e"/>
  <rect x="0.5" y="0.5" width="154" height="45" rx="7.5" fill="none" stroke="#444466" stroke-width="1"/>
  <!-- Android robot icon -->
  <g transform="translate(11, 7)">
    <!-- body -->
    <rect x="3" y="12" width="18" height="13" rx="2" fill="#3DDC84"/>
    <!-- head -->
    <rect x="5" y="5" width="14" height="9" rx="4" fill="#3DDC84"/>
    <!-- eyes -->
    <circle cx="9" cy="9" r="1.5" fill="#1a1a2e"/>
    <circle cx="15" cy="9" r="1.5" fill="#1a1a2e"/>
    <!-- antennae -->
    <line x1="9" y1="5" x2="7" y2="2" stroke="#3DDC84" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="15" y1="5" x2="17" y2="2" stroke="#3DDC84" stroke-width="1.5" stroke-linecap="round"/>
    <!-- arms -->
    <rect x="0" y="13" width="3" height="8" rx="1.5" fill="#3DDC84"/>
    <rect x="21" y="13" width="3" height="8" rx="1.5" fill="#3DDC84"/>
    <!-- legs -->
    <rect x="6" y="25" width="4" height="6" rx="2" fill="#3DDC84"/>
    <rect x="14" y="25" width="4" height="6" rx="2" fill="#3DDC84"/>
    <!-- download arrow -->
    <path d="M9 15 L9 20 M9 20 L7 18 M9 20 L11 18" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="6" y1="21" x2="12" y2="21" stroke="#1a1a2e" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <!-- Text -->
  <text x="42" y="17" font-family="Inter, Arial, sans-serif" font-size="9" fill="#aaaacc" letter-spacing="0.5">DIRECT DOWNLOAD</text>
  <text x="42" y="33" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff">Download APK</text>
  <!-- APK chip -->
  <rect x="115" y="26" width="30" height="12" rx="6" fill="#3DDC84"/>
  <text x="130" y="35" font-family="Inter, Arial, sans-serif" font-size="8" font-weight="700" fill="#1a1a2e" text-anchor="middle">.APK</text>
</svg>
